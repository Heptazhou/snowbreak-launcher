<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<meta name="color-scheme" content="dark light" />
	<meta name="referrer" content="no-referrer" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Snow Launcher Downloader</title>
	<script src="snow_launcher_downloader.js" defer></script>
</head>
<body>
	<h1>Snow Launcher Downloader</h1>
	<div class="container">
		<div id="server_form">
			<span>版本:</span>
			<label>
				<input type="text" id="version" name="version" placeholder="latest" />
			</label>
			<label>
				<input type="radio" id="bilibili" name="server" value="bilibili" />
				B服
			</label>
			<label>
				<input type="radio" id="jinshan" name="server" value="jinshan" />
				国服
			</label>
			<label>
				<input type="radio" id="seasun" name="server" value="seasun" checked />
				国际服
			</label>
		</div>
		<br />
		<button type="button" id="download" onclick="download_launcher()">下载</button>
	</div>
	<div id="progress_container">
		<div id="progress_bar"></div>
	</div>
	<p id="status">无下载进度</p>
</body>
</html>
